baseURL = "https://www.ampsicologiamadrid.com/"
languageCode = "es-ES"
defaultContentLanguage = "es"
title = "Psicóloga Madrid Centro"
publishDir = "dist"
enableRobotsTXT = true
canonifyURLs = true

[markup.goldmark.renderer]
unsafe= true

[build]
writeStats = true

# Image processing configuration
[imaging]
quality = 85
resampleFilter = "Lanczos"
anchor = "Smart"

[imaging.exif]
disableDate = false
disableLatLong = true
includeFields = ""
excludeFields = ""

# Sitemap configuration for SEO
[sitemap]
changefreq = "weekly"
priority = 0.8
filename = "sitemap.xml"

# Taxonomies for SEO
[taxonomies]
tag = "tags"
category = "categories"

[[module.mounts]]
source = "assets"
target = "assets"

[[module.mounts]]
source = "static"
target = "static"

[params]
    seoTitleSuffix = "Psicóloga Especialista en Madrid"
    name = "Alaitz Martínez Latorre"
    description = "AM Psicología Madrid, gabinete de psicología clínica para niños y adultos. Psicólogo infantil, terapia de pareja, tratamiento de depresión, ansiedad, adicciones..."
    email = "contacto@ampsicologiamadrid.com"
    phone = "686 898 494"
    cellphone = "686 898 494"
    phones = "686 898 494"
    collegiateNumber = "M-29373"
    address = """Calle Hilarión Eslava, 27bis, piso 1º, puerta 4
    28015 Madrid (Madrid)"""
    year = 2023
    background = ""
    favicon = "images/favicon.ico"
    DateForm = "January 2, 2006"

    showSubheader = true
    showTerapias = true
    showBlog = true

    footerEnableContact = true
    footerEnableFollowme = true
    footerEnableDoctoralia = true

[params.schedule]
    weekdays = "Lunes - Viernes"
    weekdaysHours = "9:00 - 20:00"
    saturday = "Sábados"
    saturdayHours = "Cerrado"
    sunday = "Domingos"
    sundayHours = "Cerrado"

