# Taglines Principales
[params.taglines]
    heroSubtitle = "Más de 15 años de experiencia ayudando a personas como tú"
    ctaFinal = "No esperes más para dar el primer paso hacia tu bienestar. Estoy aquí para acompañarte en tu proceso de cambio."
    aboutIntro = "Soy psicóloga sanitaria colegiada con más de 15 años de experiencia ayudando a personas, parejas y familias a superar sus dificultades emocionales y mejorar su bienestar."
    aboutEnhanced = "Mi enfoque terapéutico es integrador, combinando diferentes técnicas según las necesidades específicas de cada paciente. Creo firmemente en la importancia de crear un espacio seguro y de confianza donde puedas expresarte libremente."
    aboutWork = "Trabajo con adultos, adolescentes y niños, abordando una amplia variedad de problemáticas como ansiedad, depresión, problemas de pareja, dificultades familiares, adicciones y trastornos de la personalidad."

